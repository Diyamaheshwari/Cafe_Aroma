<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="Book a table at Café Aroma. Secure your Mediterranean experience today with our easy online reservation and digital booking slip.">
    <title>Book a Table | Café Aroma 🐚🏺</title>
    <link rel="stylesheet" href="/src/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&display=swap"
        rel="stylesheet">
</head>

<body>
    <header>
        <div class="container">
            <!-- Dynamic Header Injected by main.js -->
        </div>
    </header>

    <main>
        <section class="section booking-section reveal"
            style="background: linear-gradient(rgba(0, 40, 70, 0.8), rgba(0, 40, 70, 0.8)), url('/hero_bg.png') center/cover; padding-top: 10rem; padding-bottom: 8rem; min-height: 100vh; display: flex; align-items: flex-start; justify-content: center; color: white;">
            <div class="container" style="width: 100%;">
                <div style="text-align: center; margin-bottom: 4rem;" class="reveal">
                    <span class="subtitle"
                        style="color: var(--soft-gold); font-weight: 700; text-transform: uppercase;">Reservation</span>
                    <h1 class="serif" style="font-size: 3.5rem; margin-top: 0.5rem; color: white;">Reserve Your <span
                            style="color: var(--soft-gold); font-style: italic;">Table</span></h1>
                    <p
                        style="font-size: 1.2rem; color: rgba(255,255,255,0.85); line-height: 1.8; margin-top: 1rem; max-width: 600px; margin-left: auto; margin-right: auto;">
                        Join us for an unforgettable dining experience. Enjoy authentic Greek flavors and heartwarming
                        hospitality.</p>
                </div>

                <div id="booking-container" class="reveal">
                    <form id="reservationForm" class="res-form" style="max-width: 750px; margin: 0 auto; background: white; padding: 4rem; border-radius: 12px; box-shadow: 0 40px 80px rgba(0,0,0,0.6); border: none;">
                        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 2rem; margin-bottom: 2.5rem;">
                            <div class="form-group">
                                <label for="name" style="color: var(--aegean-blue); font-weight: 700; text-transform: uppercase; font-size: 0.8rem; letter-spacing: 1px; margin-bottom: 0.8rem; display: block;">Full Name</label>
                                <input type="text" id="name" required placeholder="John Doe" style="padding: 1.2rem; border-radius: 6px; border: 2px solid #f0f0f0; background: #fafafa; color: #333; width: 100%; font-size: 1rem;">
                            </div>
                            <div class="form-group">
                                <label for="phone" style="color: var(--aegean-blue); font-weight: 700; text-transform: uppercase; font-size: 0.8rem; letter-spacing: 1px; margin-bottom: 0.8rem; display: block;">Phone Number</label>
                                <input type="tel" id="phone" required placeholder="(123) 456-7890" style="padding: 1.2rem; border-radius: 6px; border: 2px solid #f0f0f0; background: #fafafa; color: #333; width: 100%; font-size: 1rem;">
                            </div>
                        </div>

                        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 2rem; margin-bottom: 2.5rem;">
                            <div class="form-group">
                                <label for="date" style="color: var(--aegean-blue); font-weight: 700; text-transform: uppercase; font-size: 0.8rem; letter-spacing: 1px; margin-bottom: 0.8rem; display: block;">Date</label>
                                <input type="date" id="date" required style="padding: 1.2rem; border-radius: 6px; border: 2px solid #f0f0f0; background: #fafafa; color: #333; width: 100%; font-size: 1rem;">
                            </div>
                            <div class="form-group">
                                <label for="time" style="color: var(--aegean-blue); font-weight: 700; text-transform: uppercase; font-size: 0.8rem; letter-spacing: 1px; margin-bottom: 0.8rem; display: block;">Time</label>
                                <input type="time" id="time" required style="padding: 1.2rem; border-radius: 6px; border: 2px solid #f0f0f0; background: #fafafa; color: #333; width: 100%; font-size: 1rem;">
                            </div>
                            <div class="form-group">
                                <label for="guests" style="color: var(--aegean-blue); font-weight: 700; text-transform: uppercase; font-size: 0.8rem; letter-spacing: 1px; margin-bottom: 0.8rem; display: block;">Guests</label>
                                <select id="guests" style="padding: 1.2rem; border-radius: 6px; border: 2px solid #f0f0f0; background: #fafafa; color: #333; width: 100%; font-size: 1rem;">
                                    <option value="1">1 Person</option>
                                    <option value="2" selected>2 People</option>
                                    <option value="3">3 People</option>
                                    <option value="4">4 People</option>
                                    <option value="5+">5+ People</option>
                                </select>
                            </div>
                        </div>

                        <div class="form-group" style="margin-bottom: 3.5rem;">
                            <label for="message" style="color: var(--aegean-blue); font-weight: 700; text-transform: uppercase; font-size: 0.8rem; letter-spacing: 1px; margin-bottom: 0.8rem; display: block;">Special Requests</label>
                            <textarea id="message" rows="3" placeholder="Any birthdays or dietary requirements?" style="padding: 1.2rem; border-radius: 6px; border: 2px solid #f0f0f0; background: #fafafa; color: #333; width: 100%; font-size: 1rem;"></textarea>
                        </div>

                        <div style="text-align: center;">
                            <button type="submit" class="btn btn-primary" style="padding: 1.2rem 4rem; width: 100%; font-size: 1.1rem; border-radius: 6px; letter-spacing: 1px; font-weight: 600; text-transform: uppercase;">Confirm Reservation</button>
                        </div>
                    </form>

                    <div id="booking-slip-container"
                        style="display: none; background: white; padding: 3rem; border-radius: 8px; max-width: 600px; margin: 0 auto; box-shadow: 0 20px 50px rgba(0,0,0,0.3);">
                        <!-- Digital Slip HTML Injected via main.js -->
                    </div>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <div class="container">
            <!-- Dynamic Footer Injected by main.js -->
        </div>
    </footer>

    <script type="module" src="/main.js"></script>
</body>

</html>
